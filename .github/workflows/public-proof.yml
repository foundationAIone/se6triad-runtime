name: Public proof smoke test

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  smoke-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run compression proof
        run: python tests/compression_test.py

      - name: Run runtime demo
        run: python tests/runtime_demo.py

      - name: Run public proof summary
        run: python scripts/run_public_proof.py

      - name: Run SE6 Gateway unit tests
        run: python -m unittest tests/test_gateway.py -v

      - name: Run SE6 Gateway demo
        run: python scripts/run_gateway_demo.py
